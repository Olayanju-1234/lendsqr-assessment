services:
  - type: web
    name: olayanju-lendsqr-be-test
    env: node
    buildCommand: npm install && npm run build && npm run migrate
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ADJUTOR_BASE_URL
        value: https://adjutor.lendsqr.com/v2
      - key: ADJUTOR_API_KEY
        sync: false
